<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Experiment 5 — AJAX Search Suggestions</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; font-family: system-ui, sans-serif; display: flex; justify-content: center; padding: 3rem 1rem; }
    .card { background: #0d1117; width: 100%; max-width: 520px; }

    .meta { font-size: 11px; color: #484f58; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1rem; }
    h1 { font-size: 24px; font-weight: 600; color: #e6edf3; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #8b949e; line-height: 1.6; margin-bottom: 2rem; }

    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
    input {
      width: 100%; padding: 13px 16px 13px 42px; font-size: 14px;
      color: #e6edf3; background: #161b22;
      border: 1px solid #30363d; border-radius: 10px; outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #58a6ff; }

    #drop {
      display: none; position: absolute; width: 100%;
      top: calc(100% + 6px); left: 0;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; overflow: hidden; z-index: 20;
    }
    .item {
      padding: 11px 16px; font-size: 14px; color: #c9d1d9;
      cursor: pointer; border-bottom: 1px solid #21262d;
      display: flex; align-items: center; gap: 10px; transition: background 0.1s;
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: #1f2937; color: #58a6ff; }
    .item mark { background: none; color: #58a6ff; font-weight: 600; }
    .item svg { opacity: 0.35; flex-shrink: 0; }

    .chips { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1.5rem; }
    .chip {
      font-size: 12px; color: #8b949e; background: #161b22;
      border: 1px solid #30363d; padding: 4px 12px;
      border-radius: 20px; cursor: pointer; transition: color 0.15s;
    }
    .chip:hover { color: #58a6ff; border-color: #58a6ff; }
  </style>
</head>
<body>
<div class="card">
  <p class="meta">Experiment 5 · AJAX</p>
  <h1>Search Suggestions</h1>
  <p class="sub">Keystroke triggers a simulated AJAX call — DOM updates without page reload.</p>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e6edf3" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="q" type="text" autocomplete="off" placeholder="e.g. python, network, signal…" oninput="search(this.value)" />
    <div id="drop"></div>
  </div>

  <div class="chips">
    <span class="chip" onclick="fill('Python')">Python</span>
    <span class="chip" onclick="fill('Network')">Network</span>
    <span class="chip" onclick="fill('Database')">Database</span>
    <span class="chip" onclick="fill('Signal')">Signal</span>
  </div>
</div>

<script>
  const data = [
    'Python Basics','Python OOP','PHP & MySQL','Parallel Computing','Packet Switching',
    'Network Topology','Network Protocols','Node.js','NumPy Arrays',
    'Database Normalization','Database Indexing','Data Structures','Data Mining','DOM Manipulation',
    'Signal Processing','Software Engineering','SQL Queries',
    'JavaScript Events','jQuery AJAX','Java Threads','JSON Parsing',
    'React Hooks','REST API Design','Recursion',
    'HTML5 Canvas','HTTP Methods','Hashing Algorithms',
    'Machine Learning','Memory Management','Microprocessors',
    'Operating Systems','Object Oriented Design',
    'Compiler Design','Cloud Computing','CSS Flexbox',
    'Fourier Transform','Finite Automata','Binary Trees','Boolean Algebra',
    'Encryption Algorithms','Embedded Systems','Error Correction',
  ];

  let timer;

  function search(val) {
    clearTimeout(timer);
    const drop = document.getElementById('drop');
    if (!val.trim()) { drop.style.display = 'none'; return; }
    timer = setTimeout(() => {
      const results = data.filter(d => d.toLowerCase().includes(val.toLowerCase())).slice(0, 6);
      if (!results.length) { drop.style.display = 'none'; return; }
      drop.innerHTML = results.map(r => {
        const i = r.toLowerCase().indexOf(val.toLowerCase());
        const hl = r.slice(0,i) + '<mark>' + r.slice(i, i+val.length) + '</mark>' + r.slice(i+val.length);
        return `<div class="item" onclick="pick('${r}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>${hl}</div>`;
      }).join('');
      drop.style.display = 'block';
    }, 250);
  }

  function pick(val) {
    document.getElementById('q').value = val;
    document.getElementById('drop').style.display = 'none';
  }

  function fill(val) {
    const inp = document.getElementById('q');
    inp.value = val;
    inp.focus();
    search(val);
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('#q') && !e.target.closest('#drop'))
      document.getElementById('drop').style.display = 'none';
  });
</script>
</body>
</html>
